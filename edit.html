<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Data Pengiriman</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen py-10">

    <div class="max-w-2xl mx-auto px-4">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">📝 Edit Data Pengiriman Paket</h1>
        
        <form action="/admin/edit/{{ id }}" method="POST" class="space-y-6">
            <!-- Bagian Data Pengirim -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h2 class="text-xl font-semibold text-gray-700 mb-4 text-blue-600">Identitas Pengirim</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Nama Pengirim *</label>
                        <input type="text" name="nama_pengirim" value="{{ t.nama_pengirim }}" required pattern="[A-Za-z\s]+" title="Nama hanya boleh berisi huruf." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">No. HP Pengirim *</label>
                        <input type="text" name="nohp_pengirim" value="{{ t.nohp_pengirim }}" required pattern="[0-9]{10,13}" inputmode="numeric" title="No. HP wajib angka 10-13 digit." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Alamat Asal *</label>
                        <textarea name="alamat_pengirim" rows="2" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">{{ t.alamat_pengirim }}</textarea>
                    </div>
                </div>
            </div>

            <!-- Bagian Data Penerima -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h2 class="text-xl font-semibold text-gray-700 mb-4 text-green-600">Identitas Penerima / Tujuan</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Nama Penerima *</label>
                        <input type="text" name="nama_penerima" value="{{ t.nama_penerima }}" required pattern="[A-Za-z\s]+" title="Nama hanya boleh berisi huruf." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">No. HP Penerima *</label>
                        <input type="text" name="nohp_penerima" value="{{ t.nohp_penerima }}" required pattern="[0-9]{10,13}" inputmode="numeric" title="No. HP wajib angka 10-13 digit." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Alamat Tujuan *</label>
                        <textarea name="alamat_tujuan" rows="2" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">{{ t.alamat_tujuan }}</textarea>
                    </div>
                </div>
            </div>

            <!-- Tombol Aksi Form Edit -->
            <div class="flex justify-end space-x-4">
                <a href="/admin" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-md transition font-medium">Batal</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition font-medium">Simpan Perubahan</button>
            </div>
        </form>
    </div>

</body>
</html>
